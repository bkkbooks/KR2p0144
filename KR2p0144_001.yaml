body:
  text: 睡虎地秦墓竹簡日書乙種十一月十二月正月二月三月四月五月六月七月八月九月十月子丑寅卯辰巳午未申酉戌亥結丑寅卯辰巳午未申酉戌亥子贏陽寅卯辰巳午未申酉戌亥子丑建交卯辰巳午未申酉戌亥子丑寅窞羅辰巳午未申酉戌亥子丑寅卯作陰巳午未申酉戌亥子丑寅卯辰平達午未申酉戌亥子丑寅卯辰巳成外未申酉戌亥子丑寅卯辰巳午空外申酉戌亥子丑寅卯辰巳午未外酉戌亥子丑寅卯辰巳午未申盍絕戌亥子丑寅卯辰巳午未申酉成决亥子丑寅卯辰巳午未申酉戌復秀惌結之日利以結言不可以作大事利以學書贏陽之日利以見人祭作大事取妻吉裚寇帶君子益事建交之日以風鑿井吉生男女窞羅之日利以說孟詐棄疾鑿宇葬吉而遇人人必奪其室作陰之日利以入室必入資貨家子攻𣪠吉勝平達之日利以行師徒見人入邦罔邋獲作事吉成外陽之日利以祭之四旁野外熱空外之日不可以行之四鄰必見兵外陰之日利以小然吉生子年不可遠行遠行不仮蓋絕紀之日利以裚衣常說孟詐成决光之日利以起大事祭家子吉居有食行有得生子美復秀之日利以乘車寇帶劍裚衣常祭作大事家子皆可吉五月日七夕九二月日八夕八三月日九夕七四月日十夕六五月日十一夕五六月日十夕六七月日九夕七八月日八夕八九月日七夕九十月日六夕十十一月日五夕十一十二月日六夕十除正月建寅余卯吉辰實巳窞午徼未衝申剽酉虛戌吉亥實子𨳯丑二月建卯余辰吉巳實午窞未徼申衝酉剽戌虛亥吉子實丑𨳯寅三月建辰余巳吉午實未窞申敫酉衝戌剽亥虛子吉丑實寅𨳯卯四月建巳徐午吉未實申窞酉敫戌衝亥剽子虛丑吉寅實卯𨳯辰五月建午徐未吉申實酉窞戌敫亥衝子剽丑虛寅吉卯實辰𨳯已六月建未徐申吉酉實戌窞亥敫子衝丑剽寅虛卯吉辰實巳𨳯午七月建申徐酉吉戌實亥窞子敫丑衝寅剽卯虛辰吉巳實午𨳯未八月建酉徐戌吉亥實子窞丑徼寅衝卯剽辰虛巳吉午實未𨳯申九月建戌徐亥吉子實丑窞寅徼卯衝辰剽巳虛午吉未實申𨳯酉十月建亥徐子吉丑實寅窞卯敫辰衝巳剽午虛未吉申實酉𨳯戌十一月建子徐丑吉寅實卯窞辰敫巳衝午剽未虛申吉酉實戌𨳯亥十二月建丑徐寅吉卯實辰窞巳徼午衝未剽申虛酉吉戌實亥𨳯子建日利初寇帶劍乘車可徐日可以請謁有吉實日皆利日也無不可有為也窞日可以入馬牛臣妾敫日可以入臣妾駕駒衝日可以攻軍入城及行不可祠剽日不可以使人及畜六畜它毋有為也虛日不可以臧蓋臧蓋它人必發之毋可有為也用得必復出𨳯日可以蓋臧及謀毋可有為也秦正月二月子𥝩丑戌正陽寅酉危陽卯敫辰申巳未陰午徹丑亥結三月四月寅𥝩卯子正陽辰亥危陽巳敫午戌未酉陰申徹丑結五月六月辰𥝩巳寅正陽午丑危陽未敫申子酉亥陰戌徹卯結七月八月午𥝩未辰正陽申未卯危陽酉敫戌寅亥丑陰子徹巳結九月十月申𥝩酉午正陽戌巳危陽亥敫巳子辰丑卯陰寅徹未結十一月十二月戌𥝩亥申正陽戌未危陽丑敫寅午巳卯陰辰徹酉結𥝩車見人入人民畜生取妻嫁女不可復室正月以朔旱歲美有兵正陽可可以祠毋小大吉可以葬正月以朔歲美毋兵危陽不成其行利事不可取妻嫁女見人生子死毋可為正月以朔多雨歲半毋兵敫有細喪毋大央殃利以穿井蓋屋不可取妻嫁女祠出入人民畜生正月以朔多雨歲善而柀不全有兵雨白也羣不𢳎以辭不合亡者得可魚邋不可攻可取不可鼠利祠外𣪠亟出正月以朔旱陰先辱後慶利居室入貨人民畜生可取婦葬貍祠正月以朔多雨歲中毋兵徹大徹利單伐不可以見人取妻嫁女出入人民畜生祠必鬭見血以生子死亡者得以𣪠久正月以朔多雨歲善毋兵五穀良日己出種及鼠人壬辰乙巳不可以鼠子亦勿以種五穀龍日子麥丑黍寅稷辰麻申戌叔壬辰瓜癸亥葵木日木良日庚寅辛卯壬辰利為木事其忌甲戌乙巳癸酉丁未癸丑寅己卯可以伐木木忌甲乙榆丙丁棗戊己桑庚辛李壬辰癸馬日馬良日甲申乙丑亥己丑酉亥未庚辰申壬辰戊辰未乘之其忌甲寅午丙辰丁壬辰丁巳未戊牛日牛良日甲午寅戊午庚午寅丙寅壬寅丁酉未甲辰可以出入牛服之其忌乙巳未辛丑戊辰壬午羊日羊良日辛巳未庚寅申辰戊辰癸未忌日甲子辰乙亥酉丙寅丁酉己巳豬日豬良日壬午戊子寅己亥庚寅辰午辛丑壬辰癸未其忌壬辰戊午戌丁犬日犬良日丁丑丁未丙辰己巳己亥忌壬戌癸未辛巳戌癸未忌丁丑丁未丙辰丙申鷄日鷄良日甲辰乙巳丙午丙辰庚辰忌辛巳卯庚寅丁未初田毋以丁亥戊戌祠室中日辛丑癸亥乙酉己酉吉龍壬辰申祠戶日壬申丁酉癸丑亥吉龍丙寅庚寅祠門日甲申辰乙亥丑酉吉龍戊寅辛巳祠行日甲申丙申戊申壬申乙亥吉龍戊己祠日己亥辛丑乙亥丁丑吉龍辛祠五祀日丙丁竈戊己內中土乙戶壬癸行庚辛凡壞垣卯在房午在七星子在虛酉在卯凶凡五巳不可入寄者不出三歲必代寄焉久行毋以庚午入室長行毋以戌亥遠去室丁卯不可以船行六壬不可以船行六庚不可以行入月六日七日八日二旬二日皆知旬六日毀五種忌日丙及寅禾甲及子麥乙巳及丑黍辰麻卯及戌叔亥稻不可以始種穫始賞其歲或弗食凡有入殹必以歲後有出殹必以歲前祠史先龍丙望生東鄉者貴南鄉者富西鄉壽北鄉者賤西北鄉者被刑春三月戌夏丑秋三月辰冬未皆不可以大祠可有求也見人良日甲子申乙人大室正月營室利祠不可為室及入之以取妻不寧生子為吏官東臂不可行百事兇以生子不完不可為它事奎祠及行吉以取妻女子愛生子為吏婁祠及百事吉以取妻男子愛之生子亡者人意之三月胃利入禾粟及為囷倉吉以取妻妻愛生子使人卯邋賈市吉不可食六畜以生子喜斲四月畢以邋置罔及為門取妻必二不可食畜生生子此𧟃百事兇可以敫人攻讎生子為正參百事吉徙死庚子寅辰北徙死五月東井百事兇以死必五人殺生必五生死取妻多子生子旬死可以為土事輿鬼祠及行吉以生子𤵸可以從鬼六月酉百事吉以生子肥可始寇可請謁可田邋取妻吉七星百事兇利以垣生子樂不可出女七月張百事吉取妻吉以生子為邑桀翼利行不可臧以祠必有火起取妻必棄生子男為見女為巫軫乘車衣常取妻吉生子必賀可入貨八月角利祠及行吉不可蓋室取妻妻妬生子子為吏亢祠為門行吉可入貨生子必有爵九月氐祠及行出入貨吉取妻妻貧生子巧方取婦家女出入貨吉可以為室生子寡祠吉十月心不可祠及行兇可以行水取妻妻悍生子人愛之尾百事兇以祠必有敫不可取妻生子貧箕不可祠百事兇取妻妻多舌生子貧富半斗利祠及行賈賈市吉取妻妻為巫生子不到三年死不可攻牽牛可祠及行吉不可殺牛以桔者不以入牛老一生子子為大夫十二月婺女祠賈市取妻吉生子三月死毋晨虛百事凶以結者易擇亡者不得取妻妻不到以生子毋它同生危百事兇生子老為人治也數詣風雨丙丁火火勝金戊己土土勝水庚辛金金勝木壬癸水水勝火酉丑巳金金勝木未亥卯木木勝土辰申子水水勝火入正月二日一日心入二月九日直心入三月七日直心入四月旬五日心入五月旬二日心入六月旬心入七月八日心入八月五日心入九月三日心入十月朔日心入十一月二旬五日心入十二月二日三日心正月壬臽二月癸臽三月戊臽四月甲臽五月乙臽六月戊臽七月丙臽八月丁臽九月己臽十月庚臽十一月辛臽十二月己臽天閻正月虛二月東辟廿七日三月角十三日四月房十四日五月旗十四日六月東井廿七日七月七星廿八日八月軫廿八日九月奎十三日十月十四日十一月參十四日十二月斗廿一日十一月乙卯天臽出邦門可行禹符左行置右環曰右環曰行邦令行投符地禹步三曰皋敢告符上車毋顧上人日凡子卯寅酉男子日午未申丑亥女子日以女子日病病瘳必復之以女子日死死以葬必復之男子日如是男子日男子日男子日寅卯子巳戌酉女子日辰午未申亥丑室忌室忌春三月庚辛夏三月壬癸秋三月甲乙冬三月丙丁勿筑室大主死𤵸弗居蓋屋春庚辛夏壬癸季秋甲乙季冬丙丁勿以作事復內㮂屋以此日㮂屋屋以此日為蓋屋屋不壞折主人必大傷蓋忌五酉甲辰丙寅不可以蓋必有火起若或死焉垣墻日凡申酉除室庚申丁酉丁亥辛卯以除室百虫弗居除室庚申丁酉丁亥辛卯以除室百虫弗居正月七月朔日以出母取婦夫妻必有死者以筑室室不居凡月望不可取婦家女入畜生凡戊子風有興雨陰有疾興在外風軍歸正月五月九月之丑二月六月十月之戌三月七月十一月之未四月八月十二月之辰勿以作事大祠以大生大兇小生小兇以昔肉吉毋以戊辰己巳入寄者入之所寄之庚申辛酉以與人言有喜以責人得壬子癸丑南與人言有喜以責得丁癸不巳未卯亥壬戌庚申己亥壬寅不可以入臣妾及寄者有咎主甲子乙丑可以家女取婦寇帶祠不可築興土攻命曰毋後毋以子卜筮視命曰毋上剛亥不可伐室中𡬾木畜生伐𡬾木裚凡五丑利以裚衣丁丑在亢裚衣常丁巳衣之必敝不可以裚初寇凡初寇必以五月庚午吉凡製車及寇申吉寄人室毋以戊辰己巳入寄人寄人反寄之辛酉卯癸卯入寄之必代當家凡且有大行遠行若飲食歌樂聚具畜生及夫妻同衣毋以正月上旬午二月上旬亥三月上旬申四月上旬丑五月上旬戌六月上旬卯七月上旬子八月七旬巳九月上旬寅十月上旬未十一月上旬辰十二月上旬丑酉凡是日赤啻恒以開臨下民而降央不可具為百事皆毋所利節以有為也其央不出歲小大必致有為也而遇雨命之央蚤至不出三月有死亡之志致凡且有為也必先計月中間日直赤啻臨日它日唯有不吉之名毋所大害行日庚節有急行以此行吉行者遠行者毋以壬戌癸亥到室以出兇入官久宦者毋以甲寅到室行忌凡行者毋犯其大忌西巳北毋以戊寅南毋以辰申行龍戊己行忌凡行祠常行道右左行祠祠常行甲辰甲申庚申壬辰壬申吉毋以丙丁戊壬行行祠行祠東行南祠道左西北行祠道右其謞曰大常行合三土皇耐為四席席叕其後亦席三叕其祝曰毋王事唯福是司勉飲食多投福祠正癸不可祠人伏伏者以死戊辰不可祠道磅道䠙以死丁不可祠道旁祠祠親乙丑吉祠室己卯戊辰戊寅吉祠戶丑午亡日正月七日二月旬三月旬一日四月八日五月旬六日六月二旬七月九日八月旬八日九月二旬七日十月旬十一月旬十二月二旬凡以此往亡必得不得必死亡者正月七日二月旬四日三月二日四月八日五月旬六日六月二旬四日七月九日八月旬八日九月二旬七日二旬凡是往亡必得不得必死見人正月甲午庚午甲戌三月己酉四月丙子五月甲午庚午六月丁丑七月甲子八月庚辰九月辛卯十月壬午十二月癸未見人吉祭祀嫁子作大事皆可鷄鳴丑平旦寅日出卯食時辰莫食巳日中午㮂昳未下市申舂日酉牛羊入戌黃昬亥人定子子以東吉北得西聞言南兇朝啟夕閉朝兆不得晝夕得以入見疾以有疾少翏午大翏死生在申黑肉從北方來把者黑色外鬼父葉為姓高王父譴適豕丑以東吉西先行北吉南得朝閉夕啟朝兆得晝夕不得以入得以有疾卯少翏巳大翏死生在口䏽肉從東方來外鬼為姓巫亦為姓寅以東北吉西先行南得朝閉夕啟朝兆得晝夕不得以入吉以有疾午少翏申大翏死生在子巫為姓卯以東吉北見疾西南得朝閉夕啟朝兆得晝夕不得以入必有大亡以有疾未少翏申大翏死生在亥狗肉從東方來中鬼見社為姓辰以東吉北兇先行南得朝閉夕啟朝兆不得夕晝得以入吉以有疾酉少翏戌大翏死生在子乾肉從東方來把者精色巫為姓巳以東吉北得西兇南見疾朝閉夕啟朝兆得晝夕不得以入吉以有疾申少翏亥大翏死生在寅赤肉從東方來高王父譴姓午以東先行北得西聞言南兇朝閉夕啟朝兆得晝夕不得以入吉有疾丑少翏辰大翏死生在寅赤肉從南方來把者赤色外鬼兄枼為姓未以東得北兇西南吉朝閉夕啟朝兆不得晝夕得以入吉以有疾子少翏卯大翏死生在寅赤肉從南方來把者赤色母葉外死為姓申以東北得西吉南兇朝閉夕啟朝兆得晝夕不得以入吉以有疾子少翏大翏死生在辰鮮魚從西方來把者白色王父譴為姓酉以東藺南聞言西兇朝啟夕閉朝兆不得晝夕得以入有有疾戌少翏子大翏死生在未赤肉從北方來外鬼父枼見而欲巫為姓室鬼欲狗戌以東得西見兵冬之吉南兇朝啟夕閉朝兆不得晝夕得以入藺以有疾卯少翏辰大翏死生在酉鮮魚從西方來把者白色高王父為姓野立為亥以東南得北吉西禺朝啟夕閉朝兆不得以入小亡以有疾巳少翏酉大翏死生在子黑肉從東方來母枼見之為姓有疾甲乙有疾禺御於豕肉王父欲殺生人為姓有病者必五病而有閒不閒死煩色亡丙丁有疾王父為姓得赤肉雄鷄酒庚辛病壬閒癸酢煩及歲皆在南方其人赤色死火日戊己有疾巫堪王父為姓索魚堇閒乙酢不酢邦中歲在西方人黃色死土日庚辛有疾外鬼傷死為姓得於肥肉鮮魚卵甲乙病丙有閒丁酢不死壬癸人外鬼為姓得於酉脯脩節肉丙丁病戊有閒己酢不酢煩在北人黑病凡酉午巳寅以問病者必代病夢甲乙夢被黑裘衣寇喜人水中及谷得也丙丁夢喜也木金得也戊己夢黑吉得喜也庚辛夢青黑喜也木水得也壬癸夢日白喜也金得也凡人有惡夢覺而擇之西北鄉擇髮而駟祝曰敢告壐宛奇某有惡夢老來之宛奇強飲食賜某大畐不錢則布不壐則絮圂忌日己丑為圂廁長者死之以癸丑少者死之其吉日戊寅戊辰戊戌戊申凡癸為屏圂必富辰不可以哭穿肆且有二喪不可卜筭筮為屋辛卯壬午不可寧人人反寧之凡酉午巳寅辛亥辛卯問病者代之入月旬七日毀垣其室日減及入月旬八日皆大凶有毀穿戶忌毋以丑穿門戶不見其光家子刑正月五月九月正東盡東南夬麗西南執辱正西郄逐西北續光正北吉富東北反鄉向二月六月十月正南盡西南斵正西夬麗西北執辱正北郄逐東北續光正東吉富東南反鄉三月七月十一月正西盡西北斵正北夬麗東北執辱正東郄逐東南續光正南吉富西南反鄉四月八月十二月正北盡東北斵正東夬麗東南執辱正南郄逐西南續光正西吉富西北反鄉不可取妻取妻毋春三月甲乙死者其後有𢝫正東有得丙丁死者其東有𢝫正西惡之死者主也戊己死去室西不去有死庚辛死者去室北不去有咎壬癸死者明鬼祟之其東受兇夏三月甲乙死者東南受央丙丁死者去室西南受兇東有𢝫戊己死者正西南有𢝫庚辛死者其東受兇其西北有𢝫壬癸死者其南有𢝫秋三月甲乙死者其東受兇男子也丙丁死者其西受兇其女子也戊己死者有庚辛死者其東北受兇正北有𢝫壬癸死者明鬼祟之其東受兇冬三月甲乙死者必兵死其南𣇩之戊己死者有𢝫庚辛死者不去其室有死正北有火起壬癸死者有𢝫南室有亡子且晉之後有得東南𣇩之冬三月甲乙死者必兵死其南𣇩之申壬申丙申戊申辛酉癸酉乙酉丁酉己酉辛卯癸卯乙卯丁卯己卯庚寅壬寅戊寅己丑辛丑癸丑乙丑丁丑壬子甲子丙子戊子庚子壬午甲午丙午戊午庚午癸亥乙亥辛亥清旦食時日則莫夕己巳辛巳癸巳乙巳丁巳癸未丁未己未辛未戊戌庚戌壬戌甲戌丙戌戊辰庚辰壬辰丙辰視羅入官春三月丙寅丙子利入官夏三月甲申甲辰乙巳乙未利入官秋三月壬子壬辰壬申庚子壬寅癸丑利入官冬三月庚申庚子庚寅辛丑利入官子丑入官久七徙戌入官行亥入官偒去申入官不計而徙酉入官有罪卯入官兇實巳入官吉未辰午入官辱而去甲寅乙丑乙巳皆可見人甲子到乙亥是右也利以臨官立政是胃貴勝賤生甲子生少孤乙丑生不武乃工考丙寅生武聖丁卯不正不然必有疵於前戊辰生有寵己巳生兇為臣妾庚午生貧武有力毋終辛未生肉食壬申生有問邦癸酉生有終甲戌生好甲乙亥生利酉醴丙子生吉丁丑生好言五有生目戊寅生遠去女子於南己卯生去其邦庚辰好女子辛巳生當吉壬午生穀於武好貨癸未生長甲申生必有事乙酉生穀利樂丙戌生有終丁亥生考戊子生去其邦北亟己丑生疾庚寅生女子為巫辛卯生不吉壬辰生必善醫衣常癸巳生穀甲午生武有力寡弟乙未生少疾後富丙申生好室丁酉生吉旨酉戊戌生姓楚己亥生小孤辛丑生有終壬寅生不吉女子為醫癸卯生不吉甲辰生穀丙午疾丁未生不吉貧為人臣戊申生有寵必事君己酉生穀庚戌生武貧辛亥生不吉壬子生恿癸丑生好乙卯生壽丙辰生必有疵於𦡊丁巳生穀媚人戊午生好田邋己未生穀庚申生恿辛酉生不吉壬戌生好室家癸亥貧毋終凡己巳生勿舉不利父母男子為人臣女子為人妾庚子生不出三日必死凡生子北首西鄉必為上卿女子為邦君妻失火甲失火去不恙子失火有子死乙失火大富丙失火有公起寅失火去不恙丁失火為人隋也卯失火不復失火必有鬼戊失火亡貨辰失火去不恙也己失火有𤵸子巳失火有死子庚失火君子兵死午失火田宇多辛失火有子死未失火臣妾亡壬失火去不善申失火富癸失火有𩪁酉失火邦有年亥失火利春盗甲亡盗在西方一宇間之食五口其疵其上得其女若母為巫其門西北出盗三人乙亡盗方內盗有人在其室丙亡為間者不寡夫乃寡婦其室在西方疵而在耳乃折齒丁亡盗女子也室在東方疵在尾其食者五口戊亡盗在南方故盗其上作折其齒之其己亡盗三人其子已死矣其間在室庚亡盗丈夫其室在西方其北壁臣其人𢷺黑日書
